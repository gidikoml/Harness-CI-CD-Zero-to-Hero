server:
  port: 8080

app:
  version: 1.0.0
  environment: ${APP_ENV:development}

# Actuator endpoints for health checks and metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: harness-course-app

# Logging
logging:
  level:
    root: ${LOG_LEVEL:info}
    com.example: debug
