# Production environment overrides

replicaCount: 5

image:
  pullPolicy: Always

service:
  type: LoadBalancer

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

env:
  APP_ENV: "production"
  LOG_LEVEL: "warn"
